<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: deep earth, subtly lit from above -->
    <radialGradient id="bg" cx="50%" cy="32%" r="90%">
      <stop offset="0%" stop-color="#332620"/>
      <stop offset="55%" stop-color="#241A14"/>
      <stop offset="100%" stop-color="#160F0B"/>
    </radialGradient>

    <!-- Sphere body: raw clay -->
    <radialGradient id="sphere" cx="38%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#A98264"/>
      <stop offset="38%" stop-color="#84603F"/>
      <stop offset="72%" stop-color="#4E3625"/>
      <stop offset="100%" stop-color="#2C1E14"/>
    </radialGradient>

    <!-- Upper hemisphere gloss (sky reflection) -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF3E6" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#F2DDBE" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FFE9CE" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft ambient bounce on the lower edge -->
    <radialGradient id="bounce" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#C49A6C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C49A6C" stop-opacity="0"/>
    </radialGradient>

    <!-- Ground shadow -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="sphereClip">
      <circle cx="512" cy="496" r="300"/>
    </clipPath>
  </defs>

  <!-- iOS squircle-ish background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- ground shadow -->
  <ellipse cx="512" cy="836" rx="252" ry="46" fill="url(#shadow)"/>

  <!-- sphere -->
  <circle cx="512" cy="496" r="300" fill="url(#sphere)"/>

  <!-- mirror shine: upper hemisphere reflection, cut by a crisp horizon line -->
  <g clip-path="url(#sphereClip)">
    <!-- glossy reflected "sky" on the top half -->
    <path d="M 212 496
             a 300 300 0 0 1 600 0
             c -90 36 -210 56 -300 56
             c -90 0 -210 -20 -300 -56 Z"
          fill="url(#gloss)"/>
    <!-- crisp horizon edge -->
    <path d="M 214 478 c 96 40 204 60 298 60 c 94 0 202 -20 298 -60"
          fill="none" stroke="#FFF4E4" stroke-opacity="0.85" stroke-width="6"/>
    <!-- lower ambient bounce light -->
    <ellipse cx="512" cy="800" rx="300" ry="170" fill="url(#bounce)"/>
  </g>

  <!-- specular hot spot -->
  <ellipse cx="406" cy="356" rx="74" ry="44" fill="#FFFFFF" opacity="0.92"
           transform="rotate(-28 406 356)"/>
  <ellipse cx="470" cy="312" rx="20" ry="12" fill="#FFFFFF" opacity="0.7"
           transform="rotate(-28 470 312)"/>
</svg>
